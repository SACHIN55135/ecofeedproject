<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoFeed - Food Waste Management & Donation Platform</title>
  <meta name="description" content="Connecting restaurants, hotels, and individuals with NGOs to minimize food waste and feed those in need.">
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- FontAwesome 6 for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- React 18 & ReactDOM 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js 4 for interactive graphics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f7f6;
      color: #2b303a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .font-outfit {
      font-family: 'Outfit', sans-serif;
    }
    .navbar-brand-custom {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: #198754 !important;
    }
    .bg-sustain {
      background-color: #198754 !important;
    }
    .btn-sustain {
      background-color: #198754;
      color: white;
      font-weight: 600;
    }
    .btn-sustain:hover {
      background-color: #146c43;
      color: white;
    }
    .text-sustain {
      color: #198754 !important;
    }
    /* AI Scanner Animation */
    .scanner-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }
    .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: #0dcaf0;
      box-shadow: 0 0 10px #0dcaf0;
      animation: scanEffect 2.5s infinite ease-in-out;
    }
    @keyframes scanEffect {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
    /* Floating Animations */
    .bounce-hover:hover {
      transform: translateY(-5px);
      transition: all 0.3s ease;
    }
    .fade-in {
      animation: fadeInEffect 0.6s ease-out;
    }
    @keyframes fadeInEffect {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Custom hidden scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="d-flex flex-column h-100">

  <!-- Root React Mounting Box -->
  <div id="root" class="d-flex flex-column h-100"></div>

  <!-- React JSX App Execution -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- PRE-SEEDED LOCAL STORAGE SEEDS ---
    const defaultUsers = [
      { id: 1, name: "La Piazza Restaurant", email: "donor@lapiazza.com", phone: "+1 555-0199", role: "Donor", password: "password", eco_points: 320, volunteer_hours: 0, volunteer_status: "Active", address: "44 Main St, Food District" },
      { id: 2, name: "Green Valley Hotel", email: "hotel@greenvalley.com", phone: "+1 555-0211", role: "Donor", password: "password", eco_points: 150, volunteer_hours: 0, volunteer_status: "Active", address: "89 Park Boulevard" },
      { id: 3, name: "Save Food Foundation", email: "ngo@savefood.org", phone: "+1 555-0188", role: "NGO", password: "password", organization_name: "Save Food Foundation", address: "12 Shelter Avenue, Central City", verification_status: "Approved", eco_points: 0, volunteer_hours: 0 },
      { id: 4, name: "Alex Mercer", email: "volunteer@helper.org", phone: "+1 555-0322", role: "Volunteer", password: "password", eco_points: 0, volunteer_hours: 14.5, volunteer_status: "Active", address: "77 Pine Street" },
      { id: 5, name: "Platform Admin", email: "admin@ecofeed.com", phone: "+1 555-0100", role: "Admin", password: "password", eco_points: 0, volunteer_hours: 0 }
    ];

    const defaultDonations = [
      { donation_id: 101, donor_id: 1, donor_name: "La Piazza Restaurant", food_name: "Fresh Veggie Salad & Pasta", quantity: 35.0, food_type: "Veg", expiry_time: "2026-07-20T22:00", pickup_address: "44 Main St, Food District", status: "Delivered", carbon_offset: 73.5, freshness_score: 95, quality_status: "PASSED", qr_code_token: "QR-VEG-101", created_at: "2026-07-14T10:00", ngo_name: "Save Food Foundation", volunteer_name: "Alex Mercer", pickup_status: "Delivered", route_distance: 2.4, route_duration: 10 },
      { donation_id: 102, donor_id: 2, donor_name: "Green Valley Hotel", food_name: "Overnight Bread & Bakery Rolls", quantity: 18.0, food_type: "Bakery", expiry_time: "2026-07-18T18:00", pickup_address: "89 Park Boulevard", status: "Accepted", carbon_offset: 32.4, freshness_score: 92, quality_status: "PASSED", qr_code_token: "QR-BAKERY-102", created_at: "2026-07-15T09:00", ngo_name: "Save Food Foundation", volunteer_name: null, pickup_status: "Requested", route_distance: 3.1, route_duration: 12 },
      { donation_id: 103, donor_id: 1, donor_name: "La Piazza Restaurant", food_name: "Baked Chicken & Vegetables", quantity: 22.0, food_type: "Non-Veg", expiry_time: "2026-07-16T12:00", pickup_address: "44 Main St, Food District", status: "Available", carbon_offset: 140.8, freshness_score: null, quality_status: null, qr_code_token: "QR-NONVEG-103", created_at: "2026-07-15T15:00" }
    ];

    const defaultFeedbacks = [
      { feedback_id: 1, donation_id: 101, rating: 5, comment: "Punctual logistics dispatch, highly compliant drivers.", from_user: "La Piazza Restaurant", to_user: "Save Food Foundation", created_at: "2026-07-14" }
    ];

    const defaultNotifications = [
      { id: 1, user_id: 1, message: "Welcome to EcoFeed! List surplus food and earn points.", is_read: false, created_at: "2026-07-15T10:00" },
      { id: 2, user_id: 3, message: "New vegetarian donation listed by La Piazza Restaurant.", is_read: false, created_at: "2026-07-15T10:05" }
    ];

    // Helper to get local data or load defaults
    const getLocal = (key, fallback) => {
      const data = localStorage.getItem(key);
      if (data) return JSON.parse(data);
      localStorage.setItem(key, JSON.stringify(fallback));
      return fallback;
    };

    // React Chart sub-component using Chart.js
    const AdminCharts = ({ donations }) => {
      const chartRef1 = useRef(null);
      const chartRef2 = useRef(null);
      const instance1 = useRef(null);
      const instance2 = useRef(null);

      useEffect(() => {
        // Destroy old instances
        if (instance1.current) instance1.current.destroy();
        if (instance2.current) instance2.current.destroy();

        // Calculate Category Quantities
        const counts = { Veg: 0, 'Non-Veg': 0, Bakery: 0, Groceries: 0 };
        donations.forEach(d => {
          if (counts[d.food_type] !== undefined) {
            counts[d.food_type] += Number(d.quantity);
          }
        });

        // Chart 1: Category Distribution
        const ctx1 = chartRef1.current.getContext('2d');
        instance1.current = new Chart(ctx1, {
          type: 'doughnut',
          data: {
            labels: ['Vegetarian', 'Non-Vegetarian', 'Bakery / Bread', 'Raw Groceries'],
            datasets: [{
              data: [counts.Veg, counts['Non-Veg'], counts.Bakery, counts.Groceries],
              backgroundColor: ['#198754', '#dc3545', '#ffc107', '#0dcaf0'],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
            }
          }
        });

        // Chart 2: Monthly Trends
        const ctx2 = chartRef2.current.getContext('2d');
        instance2.current = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
              label: 'Food Rescued (kg)',
              data: [42, 68, 90, 81, 120, 150, 95],
              backgroundColor: '#198754',
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
              x: { grid: { display: false } }
            }
          }
        });

        return () => {
          if (instance1.current) instance1.current.destroy();
          if (instance2.current) instance2.current.destroy();
        };
      }, [donations]);

      return (
        <div className="row g-4">
          <div className="col-md-6">
            <div className="card shadow-sm border-0 rounded-4 h-100">
              <div className="card-body" style={{ minHeight: '300px' }}>
                <h5 className="card-title font-outfit fw-bold text-sustain"><i className="fa-solid fa-chart-pie me-2"></i>Donations Share</h5>
                <div style={{ position: 'relative', height: '220px' }}>
                  <canvas ref={chartRef1}></canvas>
                </div>
              </div>
            </div>
          </div>
          <div className="col-md-6">
            <div className="card shadow-sm border-0 rounded-4 h-100">
              <div className="card-body" style={{ minHeight: '300px' }}>
                <h5 className="card-title font-outfit fw-bold text-sustain"><i className="fa-solid fa-chart-column me-2"></i>Weekly Rescued Trends</h5>
                <div style={{ position: 'relative', height: '220px' }}>
                  <canvas ref={chartRef2}></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN REACT COMPONENT ---
    function App() {
      // Load stored arrays
      const [users, setUsers] = useState(() => getLocal('ecofeed_users', defaultUsers));
      const [donations, setDonations] = useState(() => getLocal('ecofeed_donations', defaultDonations));
      const [feedbacks, setFeedbacks] = useState(() => getLocal('ecofeed_feedbacks', defaultFeedbacks));
      const [notifications, setNotifications] = useState(() => getLocal('ecofeed_notifications', defaultNotifications));
      const [currentUser, setCurrentUser] = useState(() => getLocal('ecofeed_session', null));

      // Global States
      const [currentView, setCurrentView] = useState('home'); // home, login, register, donor-db, ngo-db, volunteer-db, admin-db, history, profile
      const [lang, setLang] = useState('en');
      const [toast, setToast] = useState(null);
      const [loading, setLoading] = useState(false);

      // Search & Filters for History
      const [searchQuery, setSearchQuery] = useState('');
      const [historyFilterType, setHistoryFilterType] = useState('All');
      const [historyFilterStatus, setHistoryFilterStatus] = useState('All');
      const [historySortBy, setHistorySortBy] = useState('newest');

      // Quality scan, QR Code and navigation routing sandbox modes
      const [scanningId, setScanningId] = useState(null);
      const [activeQr, setActiveQr] = useState(null);
      const [activeScanner, setActiveScanner] = useState(null);
      const [scannerToken, setScannerToken] = useState('');
      const [scanState, setScanState] = useState('idle'); // idle, scanning, success, error
      const [scanMessage, setScanMessage] = useState('');
      const [ngoMapMode, setNgoMapMode] = useState('eco'); // eco, fast
      const [claimedRedeemed, setClaimedRedeemed] = useState(false);

      // Auth form states
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [regName, setRegName] = useState('');
      const [regEmail, setRegEmail] = useState('');
      const [regPhone, setRegPhone] = useState('');
      const [regPassword, setRegPassword] = useState('');
      const [regRole, setRegRole] = useState('Donor');
      const [regNgoName, setRegNgoName] = useState('');
      const [regNgoAddress, setRegNgoAddress] = useState('');
      const [regValidated, setRegValidated] = useState(false);

      // Posting form states
      const [foodName, setFoodName] = useState('');
      const [foodQty, setFoodQty] = useState('');
      const [foodType, setFoodType] = useState('Veg');
      const [foodExpiry, setFoodExpiry] = useState('');
      const [foodAddress, setFoodAddress] = useState('');
      const [foodImage, setFoodImage] = useState('');
      const [postValidated, setPostValidated] = useState(false);

      // Profile updates
      const [profileName, setProfileName] = useState('');
      const [profilePhone, setProfilePhone] = useState('');
      const [profileAddress, setProfileAddress] = useState('');

      // Review states
      const [reviewDonation, setReviewDonation] = useState(null);
      const [reviewRating, setReviewRating] = useState(5);
      const [reviewComment, setReviewComment] = useState('');

      // Auto sync state to LocalStorage
      useEffect(() => {
        localStorage.setItem('ecofeed_users', JSON.stringify(users));
      }, [users]);
      useEffect(() => {
        localStorage.setItem('ecofeed_donations', JSON.stringify(donations));
      }, [donations]);
      useEffect(() => {
        localStorage.setItem('ecofeed_feedbacks', JSON.stringify(feedbacks));
      }, [feedbacks]);
      useEffect(() => {
        localStorage.setItem('ecofeed_notifications', JSON.stringify(notifications));
      }, [notifications]);
      useEffect(() => {
        localStorage.setItem('ecofeed_session', JSON.stringify(currentUser));
      }, [currentUser]);

      // Fill profile edit values when view transitions
      useEffect(() => {
        if (currentUser) {
          setProfileName(currentUser.name);
          setProfilePhone(currentUser.phone);
          setProfileAddress(currentUser.address || '');
        }
      }, [currentView, currentUser]);

      // --- TOAST AND LOADER TRIGGERS ---
      const triggerToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      const simulateLoading = (callback) => {
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          callback();
        }, 1200);
      };

      // --- TRANSLATOR DICTIONARY ---
      const t = (key) => {
        const trans = {
          en: {
            donor_cockpit: "Donor Cockpit",
            ngo_cockpit: "NGO Cockpit",
            volunteer_cockpit: "Volunteer Cockpit",
            admin_cockpit: "Admin Console",
            home: "Home",
            donations_history: "Donations History",
            my_profile: "My Profile",
            logout: "Sign Out",
            post_donation: "Post Surplus Food",
            active_donations: "Active Surplus Listings",
            eco_points: "Eco-Points",
            leaderboard: "Top Donors Leaderboard",
            redeem_store: "Eco Vouchers Store",
            find_food: "Browse Available Donations",
            active_pickups: "NGO Logistics Tracker",
            volunteer_tasks: "Volunteer Transport Tasks",
            my_volunteer_deliveries: "My Transport Operations",
            notifications: "Inbox Notices",
            footer_text: "EcoFeed - Food Waste Management & Donation Platform"
          },
          es: {
            donor_cockpit: "Cabina del Donante",
            ngo_cockpit: "Cabina de la ONG",
            volunteer_cockpit: "Cabina de Voluntarios",
            admin_cockpit: "Consola de Administración",
            home: "Inicio",
            donations_history: "Historial de Donaciones",
            my_profile: "Mi Perfil",
            logout: "Cerrar Sesión",
            post_donation: "Publicar Alimentos",
            active_donations: "Listas de Alimentos Activas",
            eco_points: "Puntos Ecológicos",
            leaderboard: "Clasificación de Donantes",
            redeem_store: "Tienda de Recompensas",
            find_food: "Donaciones Disponibles",
            active_pickups: "Logística de la ONG",
            volunteer_tasks: "Tareas de Transporte",
            my_volunteer_deliveries: "Mis Operaciones de Transporte",
            notifications: "Notificaciones",
            footer_text: "EcoFeed - Plataforma de gestión y donación de residuos alimentarios"
          },
          fr: {
            donor_cockpit: "Cockpit du Donneur",
            ngo_cockpit: "Cockpit de l'ONG",
            volunteer_cockpit: "Cockpit des Bénévoles",
            admin_cockpit: "Console d'Administration",
            home: "Accueil",
            donations_history: "Historique des Dons",
            my_profile: "Mon Profil",
            logout: "Déconnexion",
            post_donation: "Publier un Don",
            active_donations: "Dons Alimentaires Actifs",
            eco_points: "Points Éco",
            leaderboard: "Classement des Donateurs",
            redeem_store: "Boutique de Bons Éco",
            find_food: "Dons Alimentaires Disponibles",
            active_pickups: "Logistique de l'ONG",
            volunteer_tasks: "Missions de Transport",
            my_volunteer_deliveries: "Mes Livraisons Bénévoles",
            notifications: "Boîte de Réception",
            footer_text: "EcoFeed - Plateforme de gestion et de don des déchets alimentaires"
          },
          hi: {
            donor_cockpit: "दाता कॉकपिट",
            ngo_cockpit: "एनजीओ कॉकपिट",
            volunteer_cockpit: "स्वयंसेवक कॉकपिट",
            admin_cockpit: "एडमिन कंसोल",
            home: "होम",
            donations_history: "दान इतिहास",
            my_profile: "मेरी प्रोफाइल",
            logout: "लॉगआउट",
            post_donation: "अधिशेष भोजन पोस्ट करें",
            active_donations: "सक्रिय अधिशेष सूचियां",
            eco_points: "इको-पॉइंट्स",
            leaderboard: "शीर्ष दाता लीडरबोर्ड",
            redeem_store: "इको वाउचर स्टोर",
            find_food: "उपलब्ध भोजन खोजें",
            active_pickups: "एनजीओ लॉजिस्टिक्स ट्रैकर",
            volunteer_tasks: "स्वयंसेवक परिवहन कार्य",
            my_volunteer_deliveries: "मेरे परिवहन कार्य",
            notifications: "सूचनाएं",
            footer_text: "EcoFeed - खाद्य अपशिष्ट प्रबंधन और दान मंच"
          }
        };
        return trans[lang]?.[key] || trans['en']?.[key] || key;
      };

      // --- AUTH HANDLERS ---
      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const userObj = users.find(u => u.email.toLowerCase() === loginEmail.toLowerCase() && u.password === loginPassword);
        if (userObj) {
          simulateLoading(() => {
            setCurrentUser(userObj);
            triggerToast(`Welcome back, ${userObj.name}!`, "success");
            if (userObj.role === 'Donor') setCurrentView('donor-db');
            else if (userObj.role === 'NGO') setCurrentView('ngo-db');
            else if (userObj.role === 'Volunteer') setCurrentView('volunteer-db');
            else if (userObj.role === 'Admin') setCurrentView('admin-db');
            
            // Clear fields
            setLoginEmail('');
            setLoginPassword('');
          });
        } else {
          triggerToast("Invalid login credentials, please try again.", "danger");
        }
      };

      const handleRegisterSubmit = (e) => {
        e.preventDefault();
        setRegValidated(true);
        if (!regName || !regEmail || !regPhone || !regPassword) {
          return;
        }

        if (regRole === 'NGO' && (!regNgoName || !regNgoAddress)) {
          return;
        }

        const newUser = {
          id: users.length + 1,
          name: regName,
          email: regEmail,
          phone: regPhone,
          role: regRole,
          password: regPassword,
          eco_points: 0,
          volunteer_hours: 0,
          volunteer_status: "Active",
          address: regRole === 'NGO' ? regNgoAddress : "City Center Hub",
          organization_name: regRole === 'NGO' ? regNgoName : undefined,
          verification_status: regRole === 'NGO' ? 'Pending' : undefined
        };

        simulateLoading(() => {
          setUsers([...users, newUser]);
          setCurrentUser(newUser);
          triggerToast("Registration completed successfully!", "success");
          
          if (regRole === 'Donor') setCurrentView('donor-db');
          else if (regRole === 'NGO') {
            setCurrentView('ngo-db');
            triggerToast("Account pending admin approval", "warning");
          }
          else if (regRole === 'Volunteer') setCurrentView('volunteer-db');

          // Reset
          setRegName('');
          setRegEmail('');
          setRegPhone('');
          setRegPassword('');
          setRegNgoName('');
          setRegNgoAddress('');
          setRegValidated(false);
        });
      };

      const demoLogin = (role) => {
        const rolesMap = {
          'Donor': 'donor@lapiazza.com',
          'NGO': 'ngo@savefood.org',
          'Volunteer': 'volunteer@helper.org',
          'Admin': 'admin@ecofeed.com'
        };
        const email = rolesMap[role];
        const userObj = users.find(u => u.email === email);
        if (userObj) {
          setCurrentUser(userObj);
          triggerToast(`Demo login as ${userObj.name} (${userObj.role})`);
          if (userObj.role === 'Donor') setCurrentView('donor-db');
          else if (userObj.role === 'NGO') setCurrentView('ngo-db');
          else if (userObj.role === 'Volunteer') setCurrentView('volunteer-db');
          else if (userObj.role === 'Admin') setCurrentView('admin-db');
        }
      };

      // --- PROFILE UPDATE HANDLER ---
      const handleProfileUpdate = (e) => {
        e.preventDefault();
        const updated = {
          ...currentUser,
          name: profileName,
          phone: profilePhone,
          address: profileAddress
        };
        setUsers(users.map(u => u.id === currentUser.id ? updated : u));
        setCurrentUser(updated);
        triggerToast("User profile details updated successfully!");
      };

      // --- DONATION HANDLERS ---
      const handleAddDonation = (e) => {
        e.preventDefault();
        setPostValidated(true);
        if (!foodName || !foodQty || !foodExpiry || !foodAddress) {
          return;
        }

        const imagesMap = {
          Veg: "https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&q=80&w=600",
          "Non-Veg": "https://images.unsplash.com/photo-1532550907401-a500c9a57435?auto=format&fit=crop&q=80&w=600",
          Bakery: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=600",
          Groceries: "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=600"
        };

        const qty = parseFloat(foodQty);
        const co2Factors = { Veg: 2.1, "Non-Veg": 6.4, Bakery: 1.8, Groceries: 1.5 };
        const carbon = qty * (co2Factors[foodType] || 1.5);
        const code = `QR-${foodType.toUpperCase()}-${Date.now().toString().slice(-4)}`;

        const newDonation = {
          donation_id: donations.length + 101,
          donor_id: currentUser.id,
          donor_name: currentUser.name,
          food_name: foodName,
          quantity: qty,
          food_type: foodType,
          expiry_time: foodExpiry,
          pickup_address: foodAddress,
          image: foodImage || imagesMap[foodType],
          status: 'Available',
          carbon_offset: carbon,
          freshness_score: null,
          quality_status: null,
          qr_code_token: code,
          created_at: new Date().toISOString()

          setNotifications([

          // Reset

          setFoodQty('');
          setFoodExpiry('');
          setFoodAddress('');
          setFoodImage('');
          setPostValidated(false);
        });

      // AI Quality Auditing
      const triggerQualityInspect = (id) => {
        setScanningId(id);
        setTimeout(() => {
          const score = Math.round(88 + Math.random() * 10);
          setDonations(prev => prev.map(d => {
            if (d.donation_id === id) {
              return { ...d, freshness_score: score, quality_status: 'PASSED' };

            return d;
          }));
          setScanningId(null);
          triggerToast(`AI inspection results: Freshness score is ${score}% - Certified Safe!`, "info");

      // NGO Claims Donation
      const ngoClaimDonation = (id) => {
        if (currentUser.verification_status !== 'Approved') {
          triggerToast("Your NGO account is pending approval by Platform Admins.", "warning");
          return;

        const distance = parseFloat((1.2 + (id % 4) * 1.5).toFixed(1));

        const donation = donations.find(d => d.donation_id === id);
        if (!donation) return;

        if (donation.qr_code_token !== enteredCode) {
          setScanState('error');
          setScanMessage('Verification Mismatch: Entered token is invalid.');
          return;

        setScanState('scanning');
        setScanMessage('Analyzing digital signature & authenticating handover...');

        setTimeout(() => {
          const pointsMultipliers = { Veg: 10, "Non-Veg": 20, Bakery: 15, Groceries: 12 };
          const points = Math.round(donation.quantity * (pointsMultipliers[donation.food_type] || 10));

          // Credit donor points
          setUsers(prevUsers => prevUsers.map(u => {
            if (u.id === donation.donor_id) {
              return { ...u, eco_points: (u.eco_points || 0) + points };
            }
            // Credit volunteer hours
            if (donation.volunteer_id && u.id === donation.volunteer_id) {
              const hours = parseFloat((donation.quantity * 0.1).toFixed(1));
              return { ...u, volunteer_hours: (u.volunteer_hours || 0) + hours };
            }
            return u;
          }));

          // Sync current logged in user eco points in local session
          if (currentUser.id === donation.donor_id) {
            setCurrentUser(prev => ({ ...prev, eco_points: (prev.eco_points || 0) + points }));
          } else if (donation.volunteer_id && currentUser.id === donation.volunteer_id) {
            const hours = parseFloat((donation.quantity * 0.1).toFixed(1));
            setCurrentUser(prev => ({ ...prev, volunteer_hours: (prev.volunteer_hours || 0) + hours }));
          }

          // Complete donation
          setDonations(prev => prev.map(d => {
            if (d.donation_id === id) {
              return {
                ...d,
                status: 'Delivered',
                pickup_status: 'Delivered'
              };
            }
            return d;
          }));

          setNotifications([
            { id: notifications.length + 1, user_id: donation.donor_id, message: `Handover Verified: Rescued food delivered! +${points} Eco-Points rewarded.`, is_read: false, created_at: new Date().toISOString() },
            ...notifications
          ]);

          setScanState('success');
          setScanMessage(`Scan verified successfully! Dispatch confirmed.`);
          setTimeout(() => {
            setActiveScanner(null);
          }, 2000);
        }, 2200);
      };

                              <td>{d.ngo_name || <span className="text-muted text-[10px] italic">Not claimed</span>}</td>
                              <td>
                                <span className={`badge bg-${d.food_type==='Veg' ? 'success':'danger'}`}>{d.food_type}</span>
                              </td>
                              <td className="fw-bold">{d.quantity} kg</td>
                              <td className="text-success fw-bold"><i className="fa-solid fa-leaf me-1"></i>-{d.carbon_offset.toFixed(1)} kg CO2</td>
                              <td>
                                <span className={`badge rounded-pill bg-${
                                  d.status === 'Delivered' ? 'success' :
                                  d.status === 'Picked Up' ? 'warning text-dark' :
                                  d.status === 'Accepted' ? 'primary' :
                                  'secondary'
                                }`}>
                                  {d.status}
                                </span>
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </section>
            )}

            {/* 9. USER PROFILE EDIT PAGE */}
            {currentView === 'profile' && currentUser && (
              <section className="container py-5 fade-in">
                <div className="row justify-content-center">
                  <div className="col-md-6">
                    <div className="card border-0 shadow-lg rounded-4 p-4">
                      <div className="card-body">
                        <h3 className="font-outfit fw-bold text-success mb-2"><i className="fa-solid fa-user-gear me-2"></i>Profile Management</h3>
                        <p className="text-muted text-xs mb-4">View credentials and update communication details.</p>
                        
                        <form onSubmit={handleProfileUpdate} className="space-y-3 text-xs">
                          <div className="mb-3">
                            <label className="form-label font-bold text-secondary">Name</label>
                            <input 
                              type="text" 
                              value={profileName} 
                              onChange={(e) => setProfileName(e.target.value)} 
                              className="form-control text-xs" 
                              required 
                            />
                          </div>
                          <div className="mb-3">
                            <label className="form-label font-bold text-secondary">Phone Contact</label>
                            <input 
                              type="text" 
                              value={profilePhone} 
                              onChange={(e) => setProfilePhone(e.target.value)} 
                              className="form-control text-xs" 
                              required 
                            />
                          </div>
                          <div className="mb-4">
                            <label className="form-label font-bold text-secondary">Office Address / Location</label>
                            <input 
                              type="text" 
                              value={profileAddress} 
                              onChange={(e) => setProfileAddress(e.target.value)} 
                              className="form-control text-xs" 
                              required 
                            />
                          </div>
                          <button type="submit" className="btn btn-sustain w-full py-2.5 rounded-3 text-xs">
                            Save Changes
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </section>
            )}

          </main>

          {/* --- FOOTER CONTENT --- */}
          <footer className="footer mt-auto py-4 bg-dark text-white border-top border-secondary">
            <div className="container text-center">
              <div className="row g-3 align-items-center justify-content-between text-xs">
                <div className="col-md-6 text-md-start">
                  <span className="font-bold text-success font-outfit me-1"><i className="fa-solid fa-leaf me-1"></i>EcoFeed</span>
                  <span>© 2026 EcoFeed System. All rights reserved.</span>
                </div>
                <div className="col-md-6 text-md-end space-x-3">
                  <a href="#" className="text-white text-decoration-none me-3 hover:underline">Appreciation Certificate Code</a>
                  <a href="#" className="text-white text-decoration-none hover:underline">Hygienic Transport Standard Guide</a>
                </div>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // --- RENDER APP IN ROOT BOX ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
