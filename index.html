<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoFeed - Food Waste Management & Donation Platform</title>
  <meta name="description" content="Connecting restaurants, hotels, and individuals with NGOs to minimize food waste and feed those in need.">
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for fallback icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React 18 & ReactDOM 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            sustain: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
              950: '#022c22',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            }
          }
        }
      }
    }
  </script>

  <style type="text/css">
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, .font-outfit {
      font-family: 'Outfit', sans-serif;
    }
    /* Smooth transition for theme colors */
    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.15s ease;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Root React App Container -->
  <div id="root"></div>

  <!-- React JSX Code -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- MOCK DATABASE SEED DATA ---
    const initialUsers = [
      { id: 1, name: "La Piazza Restaurant", email: "donor@lapiazza.com", phone: "+1 555-0199", role: "Donor", password: "password" },
      { id: 2, name: "Green Valley Hotel", email: "hotel@greenvalley.com", phone: "+1 555-0211", role: "Donor", password: "password" },
      { id: 3, name: "Save Food Foundation", email: "ngo@savefood.org", phone: "+1 555-0188", role: "NGO", password: "password", organization_name: "Save Food Foundation", address: "742 Evergreen Terrace, Springfield", verification_status: "Approved" },
      { id: 4, name: "Hope Mission Charity", email: "ngo@hopemission.org", phone: "+1 555-0133", role: "NGO", password: "password", organization_name: "Hope Mission Charity", address: "123 Main St, Springfield", verification_status: "Pending" },
      { id: 5, name: "Super Admin", email: "admin@ecofeed.com", phone: "+1 555-0100", role: "Admin", password: "password" }
    ];

    const initialDonations = [
      {
        donation_id: 101,
        donor_id: 1,
        donor_name: "La Piazza Restaurant",
        food_name: "Fresh Baked Lasagna & Bread",
        quantity: 25, // servings / kg
        food_type: "Veg",
        expiry_time: "2026-06-03T18:00",
        pickup_address: "456 Italian Way, Food District",
        image: "https://images.unsplash.com/photo-1574894709920-11b28e7367e3?auto=format&fit=crop&q=80&w=600",
        status: "Available",
        created_at: "2026-06-03T08:30"
      },
      {
        donation_id: 102,
        donor_id: 2,
        donor_name: "Green Valley Hotel",
        food_name: "Mixed Dinner Buffet Items",
        quantity: 60,
        food_type: "Non-Veg",
        expiry_time: "2026-06-03T23:30",
        pickup_address: "88 Luxury Blvd, Uptown",
        image: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=600",
        status: "Claimed",
        ngo_id: 3,
        ngo_name: "Save Food Foundation",
        pickup_status: "Requested",
        created_at: "2026-06-03T07:15"
      },
      {
        donation_id: 103,
        donor_id: 1,
        donor_name: "La Piazza Restaurant",
        food_name: "Assorted Breakfast Pastries",
        quantity: 15,
        food_type: "Bakery",
        expiry_time: "2026-06-02T12:00",
        pickup_address: "456 Italian Way, Food District",
        image: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&q=80&w=600",
        status: "Picked Up",
        ngo_id: 3,
        ngo_name: "Save Food Foundation",
        pickup_status: "Delivered",
        created_at: "2026-06-02T08:00"
      },
      {
        donation_id: 104,
        donor_id: 2,
        donor_name: "Green Valley Hotel",
        food_name: "Fresh Fruit Salad Platters",
        quantity: 30,
        food_type: "Veg",
        expiry_time: "2026-06-03T20:00",
        pickup_address: "88 Luxury Blvd, Uptown",
        image: "https://images.unsplash.com/photo-1519996529931-28324d5a630e?auto=format&fit=crop&q=80&w=600",
        status: "Available",
        created_at: "2026-06-03T09:00"
      }
    ];

    const initialFeedbacks = [
      { feedback_id: 1, donation_id: 103, rating: 5, comment: "Punctual collection, polite volunteers!", from_user: "La Piazza", to_user: "Save Food Foundation" },
      { feedback_id: 2, donation_id: 103, rating: 5, comment: "Quality of pastries was excellent. Kept cold.", from_user: "Save Food Foundation", to_user: "La Piazza" }
    ];

    function App() {
      // States
      const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
      const [currentUser, setCurrentUser] = useState(null);
      const [users, setUsers] = useState(initialUsers);
      const [donations, setDonations] = useState(initialDonations);
      const [feedbacks, setFeedbacks] = useState(initialFeedbacks);
      const [notifications, setNotifications] = useState([
        { id: 1, text: "New donation added by La Piazza Restaurant", time: "10 mins ago", unread: true },
        { id: 2, text: "Save Food Foundation claimed Green Valley Hotel's donation", time: "2 hours ago", unread: false }
      ]);
      const [currentView, setCurrentView] = useState('home'); // home, login, register, donor-db, ngo-db, admin-db
      const [toast, setToast] = useState(null);
      
      // Auth forms
      const [loginEmail, setLoginEmail] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [regRole, setRegRole] = useState('Donor');
      const [regName, setRegName] = useState('');
      const [regEmail, setRegEmail] = useState('');
      const [regPhone, setRegPhone] = useState('');
      const [regPassword, setRegPassword] = useState('');
      const [regNgoName, setRegNgoName] = useState('');
      const [regNgoAddress, setRegNgoAddress] = useState('');

      // Donor Form States
      const [foodName, setFoodName] = useState('');
      const [foodQty, setFoodQty] = useState('');
      const [foodType, setFoodType] = useState('Veg');
      const [foodExpiry, setFoodExpiry] = useState('');
      const [foodAddress, setFoodAddress] = useState('');
      const [foodImage, setFoodImage] = useState('');

      // Filters
      const [searchTerm, setSearchTerm] = useState('');
      const [filterType, setFilterType] = useState('All');
      const [filterStatus, setFilterStatus] = useState('Available');

      // Admin Management
      const [adminNgoFilter, setAdminNgoFilter] = useState('All');

      // Feedback submission
      const [ratingInput, setRatingInput] = useState(5);
      const [commentInput, setCommentInput] = useState('');
      const [activeFeedbackDonation, setActiveFeedbackDonation] = useState(null);

      // Dark Mode Effect
      useEffect(() => {
        const rootElement = document.documentElement;
        if (theme === 'dark') {
          rootElement.classList.add('dark');
        } else {
          rootElement.classList.remove('dark');
        }
        localStorage.setItem('theme', theme);
      }, [theme]);

      // Show Toast Helper
      const triggerToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      // Handle Login
      const handleLogin = (e) => {
        if (e) e.preventDefault();
        const user = users.find(u => u.email.toLowerCase() === loginEmail.toLowerCase() && u.password === loginPassword);
        if (user) {
          setCurrentUser(user);
          triggerToast(`Welcome back, ${user.name}!`);
          if (user.role === 'Donor') setCurrentView('donor-db');
          else if (user.role === 'NGO') setCurrentView('ngo-db');
          else if (user.role === 'Admin') setCurrentView('admin-db');
          // Clear inputs
          setLoginEmail('');
          setLoginPassword('');
        } else {
          triggerToast("Invalid email or password", "error");
        }
      };

      // Quick Login Helper for Presentation
      const quickLogin = (role) => {
        const userMap = {
          'Donor': 'donor@lapiazza.com',
          'NGO': 'ngo@savefood.org',
          'Admin': 'admin@ecofeed.com'
        };
        const email = userMap[role];
        const user = users.find(u => u.email === email);
        if (user) {
          setCurrentUser(user);
          triggerToast(`Simulated Login as ${user.name} (${user.role})`);
          if (user.role === 'Donor') setCurrentView('donor-db');
          else if (user.role === 'NGO') setCurrentView('ngo-db');
          else if (user.role === 'Admin') setCurrentView('admin-db');
        }
      };

      // Handle Register
      const handleRegister = (e) => {
        e.preventDefault();
        if (!regName || !regEmail || !regPassword || !regPhone) {
          triggerToast("Please fill in all standard fields", "error");
          return;
        }

        const newUser = {
          id: users.length + 1,
          name: regName,
          email: regEmail,
          phone: regPhone,
          role: regRole,
          password: regPassword
        };

        if (regRole === 'NGO') {
          if (!regNgoName || !regNgoAddress) {
            triggerToast("Please enter NGO organization name and address", "error");
            return;
          }
          newUser.organization_name = regNgoName;
          newUser.address = regNgoAddress;
          newUser.verification_status = 'Pending';
        }

        setUsers([...users, newUser]);
        setCurrentUser(newUser);
        triggerToast("Account registered successfully!");
        
        if (regRole === 'Donor') setCurrentView('donor-db');
        else if (regRole === 'NGO') {
          setCurrentView('ngo-db');
          triggerToast("NGO Registered! Status: Pending Approval by Admin.", "info");
        }
        
        // Reset form
        setRegName('');
        setRegEmail('');
        setRegPhone('');
        setRegPassword('');
        setRegNgoName('');
        setRegNgoAddress('');
      };

      // Handle Add Donation
      const handleAddDonation = (e) => {
        e.preventDefault();
        if (!foodName || !foodQty || !foodExpiry || !foodAddress) {
          triggerToast("Please fill all donation fields", "error");
          return;
        }

        const defaultImages = {
          Veg: "https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&q=80&w=600",
          "Non-Veg": "https://images.unsplash.com/photo-1532550907401-a500c9a57435?auto=format&fit=crop&q=80&w=600",
          Bakery: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=600",
          Groceries: "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=600"
        };

        const newDonation = {
          donation_id: donations.length + 101,
          donor_id: currentUser.id,
          donor_name: currentUser.name,
          food_name: foodName,
          quantity: parseFloat(foodQty),
          food_type: foodType,
          expiry_time: foodExpiry,
          pickup_address: foodAddress,
          image: foodImage || defaultImages[foodType],
          status: 'Available',
          created_at: new Date().toISOString()
        };

        setDonations([newDonation, ...donations]);
        setNotifications([
          { id: notifications.length + 1, text: `New donation added: ${foodName} by ${currentUser.name}`, time: "Just now", unread: true },
          ...notifications
        ]);
        triggerToast("Food donation listed successfully!");

        // Reset
        setFoodName('');
        setFoodQty('');
        setFoodExpiry('');
        setFoodAddress('');
        setFoodImage('');
      };

      // NGO Claim Donation
      const claimDonation = (donationId) => {
        if (currentUser.role !== 'NGO') {
          triggerToast("Only registered NGOs can claim donations", "error");
          return;
        }
        if (currentUser.verification_status !== 'Approved') {
          triggerToast("Your NGO account is pending approval by the Admin.", "warning");
          return;
        }

        setDonations(donations.map(d => {
          if (d.donation_id === donationId) {
            return {
              ...d,
              status: 'Claimed',
              ngo_id: currentUser.id,
              ngo_name: currentUser.name,
              pickup_status: 'Requested'
            };
          }
          return d;
        }));

        setNotifications([
          { id: notifications.length + 1, text: `${currentUser.name} has claimed the donation for ${donations.find(d => d.donation_id === donationId).food_name}`, time: "Just now", unread: true },
          ...notifications
        ]);
        triggerToast("Donation claimed successfully! Coordinate with the donor.");
      };

      // NGO Update Pickup Status
      const updatePickupStatus = (donationId, nextStatus) => {
        setDonations(donations.map(d => {
          if (d.donation_id === donationId) {
            const updated = { ...d, pickup_status: nextStatus };
            if (nextStatus === 'Delivered') {
              updated.status = 'Picked Up';
            }
            return updated;
          }
          return d;
        }));

        triggerToast(`Status updated to: ${nextStatus}`);
      };

      // Feedback submission
      const submitFeedback = (e) => {
        e.preventDefault();
        if (!activeFeedbackDonation) return;

        const newFeedback = {
          feedback_id: feedbacks.length + 1,
          donation_id: activeFeedbackDonation.donation_id,
          rating: ratingInput,
          comment: commentInput,
          from_user: currentUser.name,
          to_user: currentUser.role === 'Donor' ? activeFeedbackDonation.ngo_name : activeFeedbackDonation.donor_name
        };

        setFeedbacks([...feedbacks, newFeedback]);
        setActiveFeedbackDonation(null);
        setCommentInput('');
        triggerToast("Feedback submitted successfully!");
      };

      // Admin Approvals
      const approveNgo = (userId) => {
        setUsers(users.map(u => {
          if (u.id === userId) {
            return { ...u, verification_status: 'Approved' };
          }
          return u;
        }));
        triggerToast("NGO Registration approved!");
      };

      const rejectNgo = (userId) => {
        setUsers(users.map(u => {
          if (u.id === userId) {
            return { ...u, verification_status: 'Rejected' };
          }
          return u;
        }));
        triggerToast("NGO Registration rejected", "warning");
      };

      // Stats Calculations
      const stats = useMemo(() => {
        const foodSaved = donations
          .filter(d => d.status === 'Picked Up')
          .reduce((acc, curr) => acc + curr.quantity, 0);

        const activeDonationsCount = donations.filter(d => d.status === 'Available').length;
        const totalDonationsCount = donations.length;
        const ngosConnected = users.filter(u => u.role === 'NGO' && u.verification_status === 'Approved').length;

        return { foodSaved, activeDonationsCount, totalDonationsCount, ngosConnected };
      }, [donations, users]);

      // Filtered donations for NGO browsing
      const filteredDonations = useMemo(() => {
        return donations.filter(d => {
          const matchesSearch = d.food_name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                d.pickup_address.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesType = filterType === 'All' || d.food_type === filterType;
          const matchesStatus = filterStatus === 'All' || d.status === filterStatus;
          return matchesSearch && matchesType && matchesStatus;
        });
      }, [donations, searchTerm, filterType, filterStatus]);

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* --- TOP HACKATHON ROLE QUICK SELECT BAR --- */}
          <div className="bg-sustain-900 text-xs text-white py-2 px-4 flex justify-between items-center border-b border-sustain-800 z-50">
            <div className="flex items-center gap-2">
              <span className="bg-sustain-500 text-black px-1.5 py-0.5 rounded font-bold uppercase tracking-wider text-[9px]">Hackathon Controls</span>
              <span className="hidden md:inline text-sustain-300">Quickly toggle user personas to test interactions in real-time:</span>
            </div>
            <div className="flex items-center gap-1.5">
              <button onClick={() => quickLogin('Donor')} className="bg-emerald-800 hover:bg-emerald-700 px-2 py-0.5 rounded font-medium border border-emerald-600 transition-colors">
                🔑 Donor Sandbox
              </button>
              <button onClick={() => quickLogin('NGO')} className="bg-sky-800 hover:bg-sky-700 px-2 py-0.5 rounded font-medium border border-sky-600 transition-colors">
                🔑 NGO Sandbox
              </button>
              <button onClick={() => quickLogin('Admin')} className="bg-amber-800 hover:bg-amber-700 px-2 py-0.5 rounded font-medium border border-amber-600 transition-colors">
                🔑 Admin Sandbox
              </button>
              {currentUser && (
                <button onClick={() => { setCurrentUser(null); setCurrentView('home'); triggerToast("Logged out successfully"); }} className="bg-rose-900 hover:bg-rose-800 px-2 py-0.5 rounded font-medium border border-rose-600 transition-colors">
                  Logout
                </button>
              )}
            </div>
          </div>

          {/* --- MAIN HEADER NAVBAR --- */}
          <header className="sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 z-40">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              
              {/* Logo */}
              <div className="flex items-center cursor-pointer" onClick={() => setCurrentView('home')}>
                <div className="h-10 w-10 bg-gradient-to-tr from-sustain-500 to-lime-400 rounded-xl flex items-center justify-center shadow-lg shadow-sustain-500/20 mr-3">
                  <svg className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                  </svg>
                </div>
                <span className="text-xl font-bold font-outfit tracking-tight bg-gradient-to-r from-sustain-600 to-sustain-800 dark:from-sustain-400 dark:to-lime-400 bg-clip-text text-transparent">
                  EcoFeed
                </span>
              </div>

              {/* Navigation Tabs */}
              <nav className="hidden md:flex space-x-8 text-sm font-medium">
                <button onClick={() => setCurrentView('home')} className={`transition-colors py-1 ${currentView === 'home' ? 'text-sustain-600 dark:text-sustain-400 border-b-2 border-sustain-500' : 'text-slate-600 dark:text-slate-300 hover:text-sustain-500'}`}>
                  Home
                </button>
                {currentUser && currentUser.role === 'Donor' && (
                  <button onClick={() => setCurrentView('donor-db')} className={`transition-colors py-1 ${currentView === 'donor-db' ? 'text-sustain-600 dark:text-sustain-400 border-b-2 border-sustain-500' : 'text-slate-600 dark:text-slate-300 hover:text-sustain-500'}`}>
                    Donor Dashboard
                  </button>
                )}
                {currentUser && currentUser.role === 'NGO' && (
                  <button onClick={() => setCurrentView('ngo-db')} className={`transition-colors py-1 ${currentView === 'ngo-db' ? 'text-sustain-600 dark:text-sustain-400 border-b-2 border-sustain-500' : 'text-slate-600 dark:text-slate-300 hover:text-sustain-500'}`}>
                    NGO Dashboard
                  </button>
                )}
                {currentUser && currentUser.role === 'Admin' && (
                  <button onClick={() => setCurrentView('admin-db')} className={`transition-colors py-1 ${currentView === 'admin-db' ? 'text-sustain-600 dark:text-sustain-400 border-b-2 border-sustain-500' : 'text-slate-600 dark:text-slate-300 hover:text-sustain-500'}`}>
                    Admin Console
                  </button>
                )}
                <a href="#about" onClick={() => setCurrentView('home')} className="text-slate-600 dark:text-slate-300 hover:text-sustain-500 py-1">About</a>
                <a href="#how-it-works" onClick={() => setCurrentView('home')} className="text-slate-600 dark:text-slate-300 hover:text-sustain-500 py-1">How It Works</a>
                <a href="#contact" onClick={() => setCurrentView('home')} className="text-slate-600 dark:text-slate-300 hover:text-sustain-500 py-1">Contact</a>
              </nav>

              {/* Right Menu: DarkMode, Login button, User Info */}
              <div className="flex items-center space-x-4">
                
                {/* Theme toggle */}
                <button 
                  onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                  className="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors"
                  aria-label="Toggle theme"
                >
                  {theme === 'dark' ? (
                    <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>
                  ) : (
                    <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                  )}
                </button>

                {/* Notifications Bell */}

                              </div>

                              <div className="flex gap-2">
                                {d.pickup_status === 'Requested' && (
                                  <button 
                                    onClick={() => updatePickupStatus(d.donation_id, 'In Transit')}
                                    className="bg-sky-600 hover:bg-sky-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg"
                                  >
                                    Start Dispatch
                                  </button>
                                )}
                                {d.pickup_status === 'In Transit' && (
                                  <button 
                                    onClick={() => updatePickupStatus(d.donation_id, 'Delivered')}
                                    className="bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg"
                                  >
                                    Mark as Collected & Delivered
                                  </button>
                                )}
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                  </div>

                  {/* Right Column: Google Maps Mock & Feedback Logs */}
                  <div className="lg:col-span-1 space-y-6">
                    
                    {/* Google Maps Interactive Simulation */}
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                      <h3 className="text-base font-bold font-outfit mb-3 text-slate-950 dark:text-white">Active Pickup Navigation Map</h3>
                      <div className="bg-slate-200 dark:bg-slate-850 h-56 rounded-xl relative overflow-hidden border border-slate-300 dark:border-slate-700 flex flex-col justify-between p-4">
                        {/* Map graphical simulation */}
                        <div className="absolute inset-0 flex flex-col justify-center items-center opacity-20 pointer-events-none">
                          <i className="fa-solid fa-map text-8xl text-slate-400"></i>
                        </div>
                        <div className="z-10 flex justify-between w-full">
                          <span className="bg-slate-900 text-white text-[9px] font-bold px-2 py-0.5 rounded-full"><i className="fa-solid fa-satellite mr-1"></i>GPS Enabled</span>
                          <span className="bg-emerald-500 text-black text-[9px] font-bold px-2 py-0.5 rounded-full">Optimized Route</span>
                        </div>
                        
                        {/* Simulated Path drawing using SVG */}
                        <div className="absolute inset-0 p-8 flex items-center justify-center pointer-events-none">
                          <svg className="w-full h-full text-sustain-500" stroke="currentColor" strokeWidth="3" fill="none">
                            <path strokeDasharray="5" d="M10,20 Q60,50 120,40 T220,100" />
                            <circle cx="10" cy="20" r="6" fill="#10b981" />
                            <circle cx="220" cy="100" r="6" fill="#0369a1" />
                          </svg>
                        </div>

                        <div className="z-10 bg-slate-900/90 text-white text-[10px] p-2 rounded-lg border border-slate-750 flex items-center justify-between">
                          <span>Route: Shelter Hub ➔ La Piazza Facility</span>
                          <strong>4.2 miles (11 min)</strong>
                        </div>
                      </div>
                    </div>

                    {/* NGO Feedbacks List */}
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                      <h3 className="text-base font-bold font-outfit mb-4 text-slate-950 dark:text-white">Donor Feedbacks logs</h3>
                      <div className="space-y-3 max-h-56 overflow-y-auto no-scrollbar">
                        {feedbacks.filter(f => f.to_user === currentUser.name || f.from_user === currentUser.name).map(f => (
                          <div key={f.feedback_id} className="border-b border-slate-100 dark:border-slate-800 pb-2 text-[10px]">
                            <div className="flex justify-between font-semibold">
                              <span>From: {f.from_user}</span>
                              <span className="text-amber-400">{"★".repeat(f.rating)}</span>
                            </div>
                            <p className="text-slate-400 italic mt-0.5">"{f.comment}"</p>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>

                </div>
              </section>
            )}

            {/* F. ADMIN DASHBOARD VIEW */}
            {currentView === 'admin-db' && currentUser && (
              <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
                
                {/* Header Banner */}
                <div>
                  <h2 className="text-2xl font-bold font-outfit">Platform Admin Console</h2>
                  <p className="text-xs text-slate-500">Monitor ecosystem health, verify registrations, and audit donation logs.</p>
                </div>

                {/* Grid Analytics Row */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  
                  {/* Left Column: Registrations approval list */}
                  <div className="lg:col-span-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                    <h3 className="text-base font-bold font-outfit mb-4 text-slate-950 dark:text-white border-b border-slate-100 dark:border-slate-800 pb-2">
                      Pending NGO Registrations
                    </h3>
                    <div className="space-y-4">
                      {users.filter(u => u.role === 'NGO' && u.verification_status === 'Pending').length === 0 ? (
                        <p className="text-xs text-slate-400 py-4 text-center">No pending registrations requiring review.</p>
                      ) : (
                        users.filter(u => u.role === 'NGO' && u.verification_status === 'Pending').map(u => (
                          <div key={u.id} className="border border-slate-200 dark:border-slate-800 rounded-xl p-3 bg-slate-50 dark:bg-slate-850 space-y-3 text-xs">
                            <div>
                              <h4 className="font-bold text-slate-900 dark:text-white">{u.organization_name}</h4>
                              <p className="text-[10px] text-slate-400">Representative: {u.name}</p>
                              <p className="text-[10px] text-slate-450 mt-1"><i className="fa-solid fa-location-dot mr-1"></i>{u.address}</p>
                            </div>
                            <div className="flex gap-2 justify-end pt-1">
                              <button 
                                onClick={() => rejectNgo(u.id)}
                                className="bg-rose-500/10 text-rose-600 hover:bg-rose-600 hover:text-white text-[10px] font-bold px-2.5 py-1 rounded"
                              >
                                Reject
                              </button>
                              <button 
                                onClick={() => approveNgo(u.id)}
                                className="bg-emerald-600 text-white hover:bg-emerald-700 text-[10px] font-bold px-2.5 py-1 rounded"
                              >
                                Approve
                              </button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* Right Column: Dynamic SVG Impact Charts & Audit Logs */}
                  <div className="lg:col-span-2 space-y-6">
                    
                    {/* SVG Analytics Charts (Mocking real ChartJS components beautifully) */}
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                      <h3 className="text-base font-bold font-outfit mb-4 text-slate-950 dark:text-white">Donation Metrics (Monthly)</h3>
                      
                      <div className="h-44 flex items-end justify-between px-6 pt-4 border-b border-slate-200 dark:border-slate-800 relative">
                        {/* Grid lines */}
                        <div className="absolute inset-x-0 bottom-10 border-t border-slate-100 dark:border-slate-800/80"></div>
                        <div className="absolute inset-x-0 bottom-24 border-t border-slate-100 dark:border-slate-800/80"></div>
                        
                        {/* Bar charts (pure responsive CSS/SVG design) */}
                        <div className="flex flex-col items-center gap-1.5 z-10 w-1/4">
                          <span className="text-[10px] font-bold text-slate-450">140kg</span>
                          <div className="w-12 bg-sustain-400 hover:bg-sustain-500 rounded-t-lg transition-all" style={{height: '60px'}}></div>
                          <span className="text-[10px] text-slate-400">March</span>
                        </div>
                        <div className="flex flex-col items-center gap-1.5 z-10 w-1/4">
                          <span className="text-[10px] font-bold text-slate-450">280kg</span>
                          <div className="w-12 bg-sustain-500 hover:bg-sustain-600 rounded-t-lg transition-all" style={{height: '95px'}}></div>
                          <span className="text-[10px] text-slate-400">April</span>
                        </div>
                        <div className="flex flex-col items-center gap-1.5 z-10 w-1/4">
                          <span className="text-[10px] font-bold text-slate-450">420kg</span>
                          <div className="w-12 bg-sustain-600 hover:bg-sustain-700 rounded-t-lg transition-all animate-bounce" style={{height: '130px'}}></div>
                          <span className="text-[10px] text-slate-400">May</span>
                        </div>
                        <div className="flex flex-col items-center gap-1.5 z-10 w-1/4">
                          <span className="text-[10px] font-bold text-slate-450">120kg</span>
                          <div className="w-12 bg-lime-400 hover:bg-lime-500 rounded-t-lg transition-all" style={{height: '45px'}}></div>
                          <span className="text-[10px] text-slate-400">June (Current)</span>
                        </div>
                      </div>
                    </div>

                    {/* Complete donations global tracker */}
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                      <h3 className="text-base font-bold font-outfit mb-4 text-slate-950 dark:text-white">Global Donation Audit Logs</h3>
                      
                      <div className="overflow-x-auto text-xs">
                        <table className="w-full text-left text-slate-500 dark:text-slate-400">
                          <thead className="text-[10px] text-slate-700 dark:text-slate-400 uppercase bg-slate-50 dark:bg-slate-800">
                            <tr>
                              <th className="px-4 py-2">ID</th>
                              <th className="px-4 py-2">Food</th>
                              <th className="px-4 py-2">Donor</th>
                              <th className="px-4 py-2">NGO Partner</th>
                              <th className="px-4 py-2">Status</th>
                            </tr>
                          </thead>
                          <tbody>
                            {donations.map(d => (
                              <tr key={d.donation_id} className="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                                <td className="px-4 py-2.5 font-bold">#{d.donation_id}</td>
                                <td className="px-4 py-2.5 text-slate-900 dark:text-white font-semibold">{d.food_name}</td>
                                <td className="px-4 py-2.5">{d.donor_name}</td>
                                <td className="px-4 py-2.5">{d.ngo_name || <span className="text-slate-400 italic">None</span>}</td>
                                <td className="px-4 py-2.5">
                                  <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${
                                    d.status === 'Available' ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-200' :
                                    d.status === 'Claimed' ? 'bg-sky-100 text-sky-800 dark:bg-sky-950 dark:text-sky-200' :
                                    'bg-slate-200 text-slate-800 dark:bg-slate-800'
                                  }`}>{d.status}</span>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>

                  </div>

                </div>
              </section>
            )}

          </main>

          {/* --- FOOTER --- */}
          <footer className="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-auto py-8">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-xs">
              <div className="flex items-center gap-2">
                <span className="font-bold text-slate-900 dark:text-white font-outfit">EcoFeed Platform</span>
                <span>© 2026 EcoFeed Inc. All rights reserved.</span>
              </div>
              <div className="flex gap-4">
                <a href="#" className="hover:underline">Privacy Policy</a>
                <a href="#" className="hover:underline">Terms of Service</a>
                <a href="#" className="hover:underline">Hygienic Code of Conduct</a>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Render React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
